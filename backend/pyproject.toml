[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.test"
python_files = ["test_*.py"]
asyncio_mode = "auto"
addopts = "--cov=apps --cov-report=term-missing --cov-fail-under=70"

[dependency-groups]
dev = [
    "pytest-cov==5.0.0",
]
