name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: promptvault
          POSTGRES_PASSWORD: promptvault
          POSTGRES_DB: promptvault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check .

      - name: Format check (black)
        run: |
          cd backend
          black --check --line-length 100 .

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          DATABASE_URL: postgres://promptvault:promptvault@localhost:5432/promptvault_test
        run: |
          cd backend
          pytest --tb=short

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile

      - name: Lint
        run: |
          cd frontend
          pnpm lint

      - name: Test
        run: |
          cd frontend
          pnpm exec vitest run

      - name: Build
        run: |
          cd frontend
          pnpm build
